#### IN PROGRESS

# Basic configuration options
backend = "glx";
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;

# Shadow settings
shadow = false;
shadow-radius = 10;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-exclude = [
  "n:e:Notification",
  "n:e:Plank",
  "n:w:*dock*"
];

# Opacity settings
# inactive-opacity = 0.78;
shadow-opacity = 0.9;
frame-opacity = 0.9;
inactive-opacity-override = false;
# opacity-rule = [
#   "80:class_g = 'URxvt'",
#   "90:class_g = 'Firefox'"
# ];

# Opacity rules
opacity-rule = [
  "95:class_g = 'jetbrains-goland'",
  "95:class_g = 'jetbrains-idea-ce'"
];


# Fading settings
fading = false;
fade-in-step = 20;
fade-out-step = 20;
fade-delta = 10;

# Window specific settings
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.9; };
  dock = { shadow = true; };
};

# Excluded windows
focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g ?= 'Notify-osd'",
  "class_g ?= 'Cairo-dock'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Experimental options
blur-background = true;
blur-background-frame = true;
blur-kern = "7x7box";
blur-background-fixed = true;
blur-strength = 10;

# corners
corner-radius = 15

# Logging
log-file = "/home/nuus/.logs/picom.log";
log-level = "info";

