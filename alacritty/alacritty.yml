live_config_reload: true

window:
  opacity: 1.0

font:
  normal:
    family: monospace
    style: Regular

  bold:
    family: monospace
    style: Bold

  italic:
    family: monospace
    style: Italic

  bold_italic:
    family: monospace
    style: Bold Italic

  size: 8

# Colors (Monokai Soda)
colors:
  # Default colors
  primary:
    background: '#1a1a1a'
    foreground: '#efeaea'

  # Normal colors
  normal:
    black:   '#1a1a1a'
    red:     '#f23047'
    green:   '#98e024'
    yellow:  '#fa8419'
    blue:    '#f23047'
    magenta: '#f23047'
    cyan:    '#f23047'
    white:   '#ffeaea'

  # Bright colors
  bright:
    black:   '#f2fe4c'
    red:     '#f4f05f'
    green:   '#f8f024'
    yellow:  '#f0f561'
    blue:    '#fdf5ff'
    magenta: '#f4ff5f'
    cyan:    '#f8f1eb'
    white:   '#f6f6ef'

