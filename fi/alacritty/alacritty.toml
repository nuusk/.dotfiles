live_config_reload = true

[colors.primary]
background = "#111111"
foreground = "#cccccc"

[colors.normal]
black = "#1a1a1a"
red = "#cd3131"
green = "#0dbc79"
yellow = "#e5e510"
blue = "#2472c8"
magenta = "#bc3fbc"
cyan = "#11a8cd"
white = "#e5e5e5"

[colors.bright]
black = "#666666"
red = "#f14c4c"
green = "#23d18b"
