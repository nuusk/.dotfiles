name: opencode-push-privacy-scan

on:
  push:

jobs:
  privacy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure scanner is executable
        run: chmod +x scripts/privacy_scan_local.sh

      - name: Run push privacy scan
        id: scan
        run: |
          report="$(mktemp)"
          trap 'rm -f "$report"' EXIT

          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          empty_tree="$(git hash-object -t tree /dev/null)"

          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            git diff --no-color --unified=0 "$empty_tree" "$after" | scripts/privacy_scan_local.sh >"$report" 2>&1
          else
            git diff --no-color --unified=0 "$before" "$after" | scripts/privacy_scan_local.sh >"$report" 2>&1
          fi

      - name: Publish result to workflow summary
        if: always()
        run: |
          {
            echo "## Push Privacy Scan"
            echo
            echo "This workflow uses the repo-local scanner from scripts/privacy_scan_local.sh."
            echo
            echo "If the job failed, suspicious content was detected in the pushed diff. Review locally."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pass
        run: echo "No suspicious content detected"
        if: success()

      - name: Fail with minimal output
        if: failure()
        run: |
          echo "Privacy/secret findings detected in pushed diff. Review locally using the pre-push scanner."
          exit 1
