allow_remote_control yes

# Font
font_family JetBrains Mono
bold_font JetBrains Mono Bold
italic_font JetBrains Mono Italic
font_size 11.0
fallback_family Noto Color Emoji

disable_ligatures always

# Window
window_padding_width 12
background_opacity 0.92
confirm_os_window_close 0
hide_window_decorations yes

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Colors
background #0a0e17
foreground #80ffcc
cursor #00ff80
cursor_text_color #0a0e17
selection_background #00ff80
selection_foreground #0a0e17
url_color #00e5ff
url_style single

# Normal colors
color0 #0a0e17
color1 #ff453a
color2 #00ff80
color3 #ffd60a
color4 #00e5ff
color5 #bf5af2
color6 #00e5ff
color7 #80ffcc

# Bright colors
color8 #1a2332
color9 #ff6961
color10 #33ff99
color11 #ffe04a
color12 #33eaff
color13 #d48af5
color14 #33eaff
color15 #b3ffdd

# Tab bar
active_tab_background #00ff80
active_tab_foreground #0a0e17
inactive_tab_background #1a2332
inactive_tab_foreground #3d6b5a
tab_bar_style powerline
tab_bar_edge top
